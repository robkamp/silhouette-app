<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Upload Afbeelding of PDF</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Upload een Afbeelding of PDF</h1>
    <p>Selecteer een bestand om een silhouet te genereren.</p>
    <form method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*,application/pdf" required>
        <br><br>
        <button type="submit">Upload en verwerk</button>
    </form>
    {% if error %}
        <p class="error"><strong>Fout:</strong> {{ error }}</p>
    {% endif %}
</body>
</html>
